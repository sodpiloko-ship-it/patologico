<script>
const D=JSON.parse(document.getElementById('data').textContent);
const GAIN='#0b9e57',LOSS='#d5372f';
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
document.getElementById('gen').textContent='GENERADO '+D.generated;
const pagina=t=>t==='XRP'?'https://bitso.com/es_mx/precio/xrp':`https://finance.yahoo.com/quote/${t}`;
const noticias=t=>`https://news.google.com/search?q=${encodeURIComponent(t)}`;
const btn=(txt,url)=>`<a href="${url}" target="_blank" onmouseover="this.style.borderColor='#111418';this.style.color='#111418'" onmouseout="this.style.borderColor='#c9ced6';this.style.color='#5f6673'" style="border:1px solid #c9ced6;border-radius:6px;padding:3px 9px;font-size:9.5px;font-weight:700;color:#5f6673">${txt} ↗</a>`;
const dirBadge=d=>{const m={long:['▲ LONG',GAIN,'rgba(11,158,87,0.13)'],short:['▼ SHORT',LOSS,'rgba(213,55,47,0.13)'],watch:['● WATCH','#b07c0e','rgba(176,124,14,0.13)']}[d]||['?','#5f6673','#eef0f3'];
 return `<span style="padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;background:${m[2]};color:${m[1]}">${m[0]}</span>`;};
const ccol=c=>c>=0.65?GAIN:c>=0.45?'#b07c0e':LOSS;

const ts=[...D.theses].sort((a,b)=>b.confidence-a.confidence);
document.getElementById('index').innerHTML=ts.map(t=>
 `<a href="#${t.id}" style="background:#ffffff;border:1px solid ${t.held?'var(--accent,#0b9e57)':'#d6dae0'};border-radius:16px;padding:4px 11px;font-size:11px"
   onmouseover="this.style.background='#f0f2f5'" onmouseout="this.style.background='#ffffff'">
  <b>${esc(t.ticker)}</b> <span style="color:${ccol(t.confidence)}">${t.confidence.toFixed(2)}</span></a>`).join('');

document.getElementById('reports').innerHTML=ts.map(t=>{
 const flag=t.tradeable==='yes'?'OPERABLE':t.tradeable==='proxy-only'?'SOLO PROXY':'NO OPERABLE DIRECTO';
 const cond=/condicionada/i.test((t.intent||{}).decision||'');
 return `<section id="${t.id}" style="background:#ffffff;border:1px solid #d6dae0;border-radius:12px;margin-bottom:16px;scroll-margin-top:70px">
 <div style="display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid #e6e8ec;flex-wrap:wrap">

  <span style="font-size:11px;color:#5f6673">${esc(t.name)}</span>

 <div style="padding:16px 20px">

   <span style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em">Confianza</span>

  </div>
  ${t.hypothesis?`<div style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px">Hipótesis</div>
   <div style="font-size:12.5px;color:#2a2f36;line-height:1.7;margin-bottom:14px">${esc(t.hypothesis)}</div>`:''}
  ${t.intent?`<div style="padding:9px 12px;border:1px dashed ${cond?'#b07c0e':GAIN};border-radius:6px;font-size:11px;line-height:1.7;color:${cond?'#b07c0e':GAIN};margin-bottom:14px">

  ${t.evidence.length?`<div style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px">Evidencia (${t.evidence.length})</div>`+
   t.evidence.map(e=>`<div style="padding:7px 0;border-bottom:1px dotted #edeff2;font-size:12px;line-height:1.6">
    <span style="color:${e.dir==='pro'?GAIN:LOSS};font-weight:700">${e.dir==='pro'?'▲ PRO':'▼ CONTRA'}</span> ${esc(e.summary)}
    <div style="font-size:9.5px;color:#747c89;margin-top:2px">${esc(e.source)} · ${esc(e.at)}</div></div>`).join('')+`<div style="margin-bottom:14px"></div>`:''}
  ${t.invalidators.length?`<div style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px">Invalidadores (matan la tesis si se disparan)</div>`+
   t.invalidators.map(i=>`<div style="padding:4px 0;font-size:11.5px;color:#3d434c">✖ ${esc(i)}</div>`).join('')+`<div style="margin-bottom:14px"></div>`:''}
  ${t.warnings.length?`<div style="padding:8px 11px;background:rgba(176,124,14,0.08);border:1px solid rgba(176,124,14,0.3);border-radius:6px;font-size:11px;color:#b07c0e;margin-bottom:14px">⚠ ${t.warnings.map(esc).join('<br>⚠ ')}</div>`:''}
  ${t.rationale?`<div style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px">Racional del último cálculo</div>
   <div style="font-size:10.5px;color:#747c89;line-height:1.7">${esc(t.rationale)}</div>`:''}
 </div></section>`;}).join('');
