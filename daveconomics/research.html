el hype se enfría en precio, no solo en opinión. Chanos cuestiona la valoración pre-debut y Bitfinanzas describe venta de Wall Street frente a compra de Cathie Wood en la caída — divergencia, no consenso alcista. El ruido es claro: guías de plataformas para comprar SPCX, y el pronóstico de TradingKey a 200 USD en julio, sin anclaje en los hechos de precio de la semana.", "keywords": ["SPCX", "SpaceX IPO", "valuación", "bajo IPO", "Chanos", "Cathie Wood"], "n": 6, "via": "modelo"}, "btc_short": {"summary": "Los titulares de la semana dibujan un BTC al alza: supera los $65.000, alcanza máximos y convive con compras de ballenas y ganancias amplias del mercado, con señales de inflación moderada en EE.UU. Para la tesis SHORT/put (BTC a cero), eso es el dato material: precio y flujo institucional/ballenas van en contra del sesgo bajista, no a favor. El titular de Yahoo sobre un posible fondo de mercado bajista y señales on-chain es el único marco “bajista” del set, pero es pregunta/especulación, no confirmación de caída. Ruido: guía educativa del mercado cripto (Infobae), Bitcoin Cash y su -95% histórico, y el cruce SpaceX/oro/Dow sin señal operativa para puts en Deribit. En suma, por titulares la semana no valida la convicción short; refuerza fuerza de precio y compresión del argumento “a cero”.", "keywords": ["BTC>$65000", "ballenas-compran", "máximos", "mercado-alcista", "on-chain-fondo", "put-spread-Deribit"], "n": 6, "via": "modelo"}, "metaverse": {"summary": "La cobertura de la semana es mayoritariamente didáctica y genérica sobre el metaverso (“segunda realidad/vida”, guías 2026), con poco señal de producto o economía. Lo más cercano a Roblox es un rol explicativo en Internet Matters y un repaso semanal de CriptoTendencia que cita conciertos virtuales, cierres inesperados y política en la plataforma. Meta, no Roblox, concentra la noticia de producto: IA para crear mundos virtuales desde texto. Para la tesis de economías virtuales persistentes, casi todo es ruido conceptual; el único rastro operativo en titulares es el paquete de eventos/cierres/política en Roblox, sin datos de monetización ni adopción.", "keywords": ["metaverso", "Roblox", "RBLX", "economías virtuales", "Meta IA", "conciertos virtuales"], "n": 6, "via": "modelo"}, "jpy": {"summary": "", "keywords": [], "n": 0, "via": "—"}, "xmoney": {"summary": "Los titulares de la semana mezclan anuncio y ejecución: CoinDesk sitúa el lanzamiento de X Money en abril, mientras Yahoo afirma que los pagos P2P ya operan para Premium (incluido un envío de 25 USD a Musk) y TradingView acota el producto a fiat vía Visa. Para la tesis de rieles de pago sobre base masiva, lo material es la promesa de super-app de pagos (Negocios.com cita 600 millones) y el encaje con rieles fiat/Visa, no el relato de “PayPal de Musk”. Ruido: el ángulo Dogecoin y el framing fintech genérico; hay contradicción entre “fecha en abril” y “ya lanzó P2P”, así que no se puede dar por hecho el estado real del producto solo con estos titulares.", "keywords": ["X Money", "pagos P2P", "Visa", "fiat", "Premium", "abril"], "n": 6, "via": "modelo"}, "computers": {"summary": "La semana se centró en la fricción física del cómputo IA: energía en data centers de alta densidad, conectividad y marcos de inversión (Super RIGI), más frenos fiscales en México y un lobby que habría bloqueado regulación. Eso sí importa para la tesis de infra: el cuello de botella no es solo capacidad, sino red, potencia y reglas. Mini data centers en casas y el lanzamiento de TRUSTA (ADATA) son ruido de modelo de nicho y de marca, no señal de escala. Nada de los titulares cuantifica capex, MW ni demanda real de servidores.", "keywords": ["data centers", "energía", "alta densidad", "regulación", "lobby", "Super RIGI"], "n": 6, "via": "modelo"}, "fund_regulation": {"summary": "La semana deja un solo titular de LexLatin que pregunta si México está listo para una Ley Fintech 2.0, enlazando activos digitales, open finance y el reto regulatorio. No anuncia aprobación, reforma publicada ni calendario CNBV: solo formula la duda sobre madurez del marco. Para la tesis NORTE es señal débil de que el tema sigue en agenda mediática, no de que se abrió la puerta a captación o valores tokenizados. Tratarlo como ruido de debate, no como hito regulatorio.", "keywords": ["Ley Fintech 2.0", "México", "activos digitales", "open finance", "reto regulatorio", "LexLatin"], "n": 1, "via": "modelo"}, "ondo": {"summary": "La señal dura de la semana no es de Ondo: JPMorgan, Mastercard y Ripple liquidan/transfieren bonos del Tesoro tokenizados en XRP Ledger, con cobertura que cifra el stock en ~$418 M. Eso valida la tesis RWA/TradFi on-chain, pero en rieles ajenos a Ondo: el tema gana, el capturador no está garantizado. Sobre ONDO solo hay ruido de catálogo RWA, predicciones a $10 en 2030 y un relato de -84% desde ATH sin catalizador de producto propio en los titulares.", "keywords": ["RWA", "Ondo", "Tesoro tokenizado", "XRP Ledger", "JPMorgan", "Mastercard"], "n": 6, "via": "modelo"}, "eth_art": {"summary": "La semana mezcla narrativa optimista con fricción operativa real: Forbes México habla de arte NFT «al alza», mientras la BBC reporta un NFT valorado en US$300.000 vendido por US$3.000 y DiarioBitcoin una plataforma NFT en Ethereum que detiene operaciones tras revertirse su adquisición. Para la tesis post-crash (arte on-chain en Ethereum como buen sitio), lo que importa son esas dos señales de riesgo de precio/liquidez y de estrés en infra ETH; el resto es marco y ruido. Artishock (arte tradicional vs NFTs), The Conversation (arte→metaverso) y CryptoTicker (comparativas de mercados) no aportan evidencia de recuperación del mercado. En suma: titulares de alza sin dato de flujo, y contrapeso de error de venta y cierre de plataforma; no hay, en estos titulares, confirmación de un repunte sólido del arte on-chain ETH.", "keywords": ["ETHA", "NFT", "Ethereum", "arte on-chain", "post-crash", "plataforma"], "n": 6, "via": "modelo"}, "blockchain": {"summary": "La semana refuerza la narrativa de blockchain como infraestructura: MiCA se presenta como catalizador que convierte criptoactivos en capa regulatoria/infraestructural, y varios titulares insisten en adopción institucional (Ethereum pese a debilidad de ETH; índice de Strategy con puntuación global del 32 % en banca/Bitcoin). Lo que importa para la tesis es el marco MiCA y la medición de adopción bancaria; el 32 % y el índice de Strategy son un mismo anuncio repetido, no tres señales independientes. Ruido: la cotización de ETH y el mensaje genérico de Bybit sobre “confianza” no prueban despliegue de libro distribuido como registro financiero, solo discurso de adopción. En conjunto, hay más framing institucional/regulatorio que evidencia operativa nueva en titulares.", "keywords": ["MiCA", "adopción institucional", "Ethereum", "Bitcoin Banking Index", "Strategy", "infraestructura"], "n": 6, "via": "modelo"}, "nvda_short": {"summary": "La semana giró en torno a los resultados de Nvidia: los titulares previos debatían si comprar a la espera del informe y si las cifras pondrían a prueba el rally de chips; tras publicarse, EL PAÍS reporta que pulverizó números con un 65% más de beneficio impulsado por la fiebre de la IA. Para la tesis de pico del ciclo IA y corrección fuerte, lo material es que el relato de resultados sigue siendo de fortaleza y demanda IA, no de agotamiento visible en estos titulares. Lo que sí aparece post-resultados es inestabilidad del precio y el eterno trilema comprar/vender/mantener (TradingView, Morningstar, Investing). El resto es ruido de positioning y análisis genérico (Bolsamania) sin señal de pico de ciclo en el titular.", "keywords": ["Nvidia", "resultados", "IA", "+65%", "rally chips", "inestabilidad post-earnings"], "n": 6, "via": "modelo"}, "ecny": {"summary": "La semana aporta señales de expansión del e-CNY y del riel transfronterizo, no de un destronamiento del dólar: China suma 26 bancos al yuan digital y prohíbe stablecoins ligadas al yuan, reforzando control estatal del corredor. mBridge, liderado por China, superó 55.000 millones de dólares en pagos transfronterizos; bancos de Tailandia, Singapur, Laos y Catar se suman al sistema de pagos del yuan digital. Para la tesis de riel monetario en de-dolarización, lo material es volumen mBridge y adhesión regional de bancos, no el marco periodístico de “amenaza al dominio del dólar”. El “impacto en fintech LATAM” y las preguntas retóricas sobre el dólar son ruido o proyección a partir de los mismos hechos de adopción y aceleración.", "keywords": ["e-CNY", "CBDC", "mBridge", "de-dolarización", "stablecoins yuan", "pagos transfronterizos"], "n": 6, "via": "modelo"}, "xrp": {"summary": "La semana de XRP estuvo dominada por ruido técnico y de precio: soporte frágil, métricas on-chain débiles, rebote con inflación suave en EE.UU. y un alza del 4,5% ante una posible victoria judicial que los propios titulares marcan como posible trampa alcista. Lo que importa para la tesis de riel de pagos es el ingreso de Ripple a la Fundación x402 para pagos entre agentes de IA: señal de producto e infraestructura, no de cotización. El resto —pronósticos FXStreet/Yahoo, “recuperación” compartida con BTC/ETH y vigilancia de soportes— no refuerza ni debilita el estatus de commodity ni el rol transfronterizo; es ciclo de mercado. Nada en estos titulares confirma de-dolarización ni adopción real de liquidación cross-border esta semana.", "keywords": ["XRP", "Ripple", "x402", "pagos-IA", "soporte-técnico", "victoria-judicial"], "n": 6, "via": "modelo"}, "energy": {"summary": "En la semana, el hilo nuclear argentino reaparece con escepticismo: Bloomberg Línea y Río Negro marcan grandes objetivos del Plan Nuclear, pocos avances, reordenamiento, privatización e injerencia de EE.UU., no un repunte operativo. Lo más concreto para uranio es Blue Sky Uranium en Patagonia (pruebas metalúrgicas e ingeniería del proyecto Ivana). En mercados, Ámbito reporta 13 CEDEARs de IA, energía y tierras raras; es señal de demanda de exposición, no de datos de carga eléctrica. Ruido respecto a la tesis URA/IA: el titular de ADNSUR sobre “cargar el tanque” y el rebote de fondos renovables en Finect (hasta 55% en 2026), ajenos a nuclear/uranio.", "keywords": ["Plan Nuclear Argentino", "uranio", "Blue Sky Uranium", "Ivana", "CEDEARs IA-energía", "privatización nuclear"], "n": 6, "via": "modelo"}, "ousd": {"summary": "La semana en OGN queda casi vacía de hechos: dos de tres titulares son páginas de precio y capitalización (CoinMarketCap, Binance), es decir ruido de mercado sin catalizador. El único titular de producto es el lanzamiento de una stablecoin con liquidez de pool DeFi en el protocolo Shell (BeInCrypto), sin que el titular mencione OGN, OUSD ni Origin. Para la tesis de riel post-dólar vía token de gobernanza no hay señal accionable en estos titulares; el vínculo con OUSD/Origin no está en el material.", "keywords": ["OGN", "Origin Protocol", "OUSD", "Shell", "stablecoin", "precio"], "n": 3, "via": "modelo"}, "vr": {"summary": "Los titulares de la semana sobre Meta VR son contradictorios en precio: unos afirman un desplome del 40% del Quest 3 (con impacto en PS VR2 y Vision Pro) y remates de Quest 3S en retail, mientras otros reportan subidas de Quest 3 y 3S por escasez de memoria e impacto de la IA. TechRadar titula el cierre del metaverso de realidad virtual de Meta y la reacción de usuarios de Quest 3. Para la tesis de cómputo espacial mainstream, lo relevante es el movimiento de precios y la posible retracción del lado “metaverso”, no la adopción clara del hardware. Es ruido un ranking genérico de “mejores cascos 2025” y el sensacionalismo de ganadores/perdedores sin datos en el titular. Con solo titulares no se resuelve si la demanda sube o si Meta está repreciando por costes.", "keywords": ["Meta Quest 3", "Quest 3S", "precios VR", "metaverso", "PS VR2", "Apple Vision Pro"], "n": 6, "via": "modelo"}, "silver": {"summary": "Los titulares de la semana son contradictorios en precio: Bloomberg Línea sitúa la plata por encima de US$85/oz mientras TradingKey cotiza XAGUSD en ~58 con leve alza; XTB habla de caída en oro y plata y TradingView de precios cerca de máximos por demanda industrial. Para la tesis importan la demanda industrial como soporte y el relato de equilibrio de mercado (Bloomberg), más el aviso de que China desafía el dominio del dólar vía oro (más monetario que solar/industrial). Es ruido el contenido genérico de escenarios 2026 (Rankia) y la opinión de un gestor sobre China/oro sin dato de oferta minera o FV. No hay en estos titulares evidencia de debasement del dólar ni de rígidez de la oferta; el mensaje de mercado es confuso por la discrepancia de niveles de precio.", "keywords": ["plata", "demanda industrial", "US$85", "XAGUSD", "máximos", "caída precios"], "n": 6, "via": "modelo"}, "spacex_long": {"summary": "Los titulares de la semana describen un desplome fuerte de SPCX: caídas del orden del 38% que borron ganancias del debut, racha de tres días a la baja y presión hacia el precio de OPI (~$135), con varias fuentes ya hablando de cotización bajo ese nivel. Para la tesis (acumular solo si el precio público capitula bajo $60) esto importa como señal de corrección real post-IPO, pero no como disparador de compra: el nivel de vigilancia sigue vigente y la capitulación objetivo no aparece en los titulares. Es ruido el debate «comprar/vender ya», la advertencia de Gary Black y la recomendación de compra de UBS ante Starship: opiniones y catalizadores de corto plazo que no redefinen el umbral de $60.", "keywords": ["SPCX", "desplome", "OPI", "$135", "UBS", "Starship"], "n": 6, "via": "modelo"}, "ar": {"summary": "Los titulares de la semana dibujan un mercado de lentes inteligentes en auge (+83% en envíos globales, con Meta y RayNeo al frente) y una competencia más ruidosa: Google presenta Intelligent Eyewear con Gemini (traducción en tiempo real, cámaras con IA y AR) y Snap anuncia Specs frente a Apple y Meta. Para la tesis de las gafas AR como próxima plataforma de cómputo, lo que pesa es el dato de envíos y el posicionamiento explícito de Meta de la AR como reemplazo del smartphone; el resto es señal competitiva de producto, no prueba de adopción masiva. Es ruido el marco divulgativo de “para qué sirven” y los titulares genéricos de “competencia a Apple y Meta” sin métricas. Nada en estos titulares valida aún que la AR sustituya al smartphone; sólo confirman narrativa, lanzamientos y crecimiento de envíos alegado.", "keywords": ["Meta", "lentes inteligentes", "AR", "envíos +83%", "RayNeo", "Google Intelligent Eyewear"], "n": 6, "via": "modelo"}}, "dist": [{"label": "CRIPTO", "value": 100.0}], "counts": {"theses": 20, "evidence": 18, "confidence_history": 1267, "recommendations": 1267, "fills": 4, "agent_runs": 2605}, "decisions": 5, "prices": {}, "pub": true}</script>
<script>
const D=JSON.parse(document.getElementById('data').textContent);
const GAIN='#0b9e57',LOSS='#d5372f';
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
document.getElementById('gen').textContent='GENERADO '+D.generated;
const pagina=t=>t==='XRP'?'https://bitso.com/es_mx/precio/xrp':`https://finance.yahoo.com/quote/${t}`;
const noticias=t=>`https://news.google.com/search?q=${encodeURIComponent(t)}`;
const btn=(txt,url)=>`<a href="${url}" target="_blank" onmouseover="this.style.borderColor='#111418';this.style.color='#111418'" onmouseout="this.style.borderColor='#c9ced6';this.style.color='#5f6673'" style="border:1px solid #c9ced6;border-radius:6px;padding:3px 9px;font-size:9.5px;font-weight:700;color:#5f6673">${txt} ↗</a>`;
const dirBadge=d=>{const m={long:['▲ LONG',GAIN,'rgba(11,158,87,0.13)'],short:['▼ SHORT',LOSS,'rgba(213,55,47,0.13)'],watch:['● WATCH','#b07c0e','rgba(176,124,14,0.13)']}[d]||['?','#5f6673','#eef0f3'];
 return `<span style="padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;background:${m[2]};color:${m[1]}">${m[0]}</span>`;};
const ccol=c=>c>=0.65?GAIN:c>=0.45?'#b07c0e':LOSS;

const ts=[...D.theses].sort((a,b)=>b.confidence-a.confidence);
document.getElementById('index').innerHTML=ts.map(t=>
 `<a href="#${t.id}" style="background:#ffffff;border:1px solid ${t.held?'var(--accent,#0b9e57)':'#d6dae0'};border-radius:16px;padding:4px 11px;font-size:11px"
   onmouseover="this.style.background='#f0f2f5'" onmouseout="this.style.background='#ffffff'">
  <b>${esc(t.ticker)}</b> <span style="color:${ccol(t.confidence)}">${t.confidence.toFixed(2)}</span></a>`).join('');

document.getElementById('reports').innerHTML=ts.map(t=>{
 const flag=t.tradeable==='yes'?'OPERABLE':t.tradeable==='proxy-only'?'SOLO PROXY':'NO OPERABLE DIRECTO';
 const cond=/condicionada/i.test((t.intent||{}).decision||'');
 return `<section id="${t.id}" style="background:#ffffff;border:1px solid #d6dae0;border-radius:12px;margin-bottom:16px;scroll-margin-top:70px">
 <div style="display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid #e6e8ec;flex-wrap:wrap">
  <span style="width:3px;height:14px;background:var(--accent,#111418);border-radius:2px"></span>
  <b style="font-size:16px">${esc(t.ticker)}</b>
  <span style="font-size:11px;color:#5f6673">${esc(t.name)}</span>
  ${dirBadge(t.direction)}
  ${t.held?'<span style="padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(11,158,87,0.13);color:'+GAIN+'">EN CARTERA</span>':''}
  <span style="margin-left:auto;display:flex;gap:6px">${btn('PÁGINA',pagina(t.ticker))}${btn('NEWS',noticias(t.ticker))}</span>
 </div>
 <div style="padding:16px 20px">
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap">
   <span style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em">Confianza</span>
   <span style="flex:1;max-width:300px;height:10px;background:#eef0f3;border-radius:5px;overflow:hidden"><span style="display:block;height:10px;width:${Math.round(t.confidence*100)}%;background:${ccol(t.confidence)}"></span></span>
   <b style="font-size:18px">${t.confidence.toFixed(2)}</b>
   <span style="font-size:10px;color:#747c89">ACCIÓN: <b style="color:#3d434c">${esc((t.action||'—').toUpperCase())}</b> · ${flag} · ${esc(t.cluster)} · ${esc(t.horizon)}</span>
  </div>
  ${t.hypothesis?`<div style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px">Hipótesis</div>
   <div style="font-size:12.5px;color:#2a2f36;line-height:1.7;margin-bottom:14px">${esc(t.hypothesis)}</div>`:''}
  ${t.intent?`<div style="padding:9px 12px;border:1px dashed ${cond?'#b07c0e':GAIN};border-radius:6px;font-size:11px;line-height:1.7;color:${cond?'#b07c0e':GAIN};margin-bottom:14px">
   <b>DECISIÓN ${cond?'CONDICIONADA':'FIRME'}</b> — ${esc(t.intent.decision||'')}${t.intent.venue?`<br><span style="opacity:.8">VENUE: ${esc(String(t.intent.venue).trim())}</span>`:''}${t.intent.first_buy?`<br><span style="opacity:.8">${esc(String(t.intent.first_buy).trim())}</span>`:''}</div>`:''}
  ${t.evidence.length?`<div style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px">Evidencia (${t.evidence.length})</div>`+
   t.evidence.map(e=>`<div style="padding:7px 0;border-bottom:1px dotted #edeff2;font-size:12px;line-height:1.6">
    <span style="color:${e.dir==='pro'?GAIN:LOSS};font-weight:700">${e.dir==='pro'?'▲ PRO':'▼ CONTRA'}</span> ${esc(e.summary)}
    <div style="font-size:9.5px;color:#747c89;margin-top:2px">${esc(e.source)} · ${esc(e.at)}</div></div>`).join('')+`<div style="margin-bottom:14px"></div>`:''}
  ${t.invalidators.length?`<div style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px">Invalidadores (matan la tesis si se disparan)</div>`+
   t.invalidators.map(i=>`<div style="padding:4px 0;font-size:11.5px;color:#3d434c">✖ ${esc(i)}</div>`).join('')+`<div style="margin-bottom:14px"></div>`:''}
  ${t.warnings.length?`<div style="padding:8px 11px;background:rgba(176,124,14,0.08);border:1px solid rgba(176,124,14,0.3);border-radius:6px;font-size:11px;color:#b07c0e;margin-bottom:14px">⚠ ${t.warnings.map(esc).join('<br>⚠ ')}</div>`:''}
  ${t.rationale?`<div style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px">Racional del último cálculo</div>
   <div style="font-size:10.5px;color:#747c89;line-height:1.7">${esc(t.rationale)}</div>`:''}
 </div></section>`;}).join('');
</script></body></html>
