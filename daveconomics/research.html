  ${t.hypothesis?`<div style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px">Hipótesis</div>
   <div style="font-size:12.5px;color:#2a2f36;line-height:1.7;margin-bottom:14px">${esc(t.hypothesis)}</div>`:''}
  ${t.intent?`<div style="padding:9px 12px;border:1px dashed ${cond?'#b07c0e':GAIN};border-radius:6px;font-size:11px;line-height:1.7;color:${cond?'#b07c0e':GAIN};margin-bottom:14px">
   <b>DECISIÓN ${cond?'CONDICIONADA':'FIRME'}</b> — ${esc(t.intent.decision||'')}${t.intent.venue?`<br><span style="opacity:.8">VENUE: ${esc(String(t.intent.venue).trim())}</span>`:''}${t.intent.first_buy?`<br><span style="opacity:.8">${esc(String(t.intent.first_buy).trim())}</span>`:''}</div>`:''}
  ${t.evidence.length?`<div style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px">Evidencia (${t.evidence.length})</div>`+
   t.evidence.map(e=>`<div style="padding:7px 0;border-bottom:1px dotted #edeff2;font-size:12px;line-height:1.6">
    <span style="color:${e.dir==='pro'?GAIN:LOSS};font-weight:700">${e.dir==='pro'?'▲ PRO':'▼ CONTRA'}</span> ${esc(e.summary)}
    <div style="font-size:9.5px;color:#747c89;margin-top:2px">${esc(e.source)} · ${esc(e.at)}</div></div>`).join('')+`<div style="margin-bottom:14px"></div>`:''}
  ${t.invalidators.length?`<div style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px">Invalidadores (matan la tesis si se disparan)</div>`+
   t.invalidators.map(i=>`<div style="padding:4px 0;font-size:11.5px;color:#3d434c">✖ ${esc(i)}</div>`).join('')+`<div style="margin-bottom:14px"></div>`:''}
  ${t.warnings.length?`<div style="padding:8px 11px;background:rgba(176,124,14,0.08);border:1px solid rgba(176,124,14,0.3);border-radius:6px;font-size:11px;color:#b07c0e;margin-bottom:14px">⚠ ${t.warnings.map(esc).join('<br>⚠ ')}</div>`:''}
  ${t.rationale?`<div style="font-size:10px;color:#5f6673;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px">Racional del último cálculo</div>
   <div style="font-size:10.5px;color:#747c89;line-height:1.7">${esc(t.rationale)}</div>`:''}
 </div></section>`;}).join('');
</script></body></html>
