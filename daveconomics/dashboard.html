<script>
const D=JSON.parse(document.getElementById('data').textContent);
const GAIN='#0b9e57',LOSS='#d5372f',FLAT='#3d434c';
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt=(v,d=2)=>Number(v).toLocaleString('es-MX',{minimumFractionDigits:d,maximumFractionDigits:d});
const money=(v,d=2)=>(v<0?'−$':'$')+fmt(Math.abs(v),d);
const pchip=(v,suf='%')=>{if(v==null)return'';const up=v>=0;
 return `<span style="padding:3px 8px;border-radius:6px;font-size:10.5px;font-weight:700;background:${up?'rgba(11,158,87,0.13)':'rgba(213,55,47,0.13)'};color:${up?GAIN:LOSS}">${up?'▲':'▼'} ${up?'+':'−'}${fmt(Math.abs(v))}${suf}</span>`};
const pcol=v=>v>0?GAIN:v<0?LOSS:FLAT;

const root=document.documentElement;
function applyTheme(v){root.style.setProperty('--accent',v);localStorage.setItem('dave-theme',v);}
function applyDensity(v){root.style.setProperty('--fs',v==='compacta'?'12px':'13px');
 root.style.setProperty('--rp',v==='compacta'?'6px':'9px');localStorage.setItem('dave-density',v);}
let th=localStorage.getItem('dave-theme')||'#111418';
if(!['#111418','#0b9e57','#b07c0e'].includes(th))th='#111418';  /* migra acentos del tema oscuro viejo */
const dn=localStorage.getItem('dave-density')||'comoda';
applyTheme(th);applyDensity(dn);
document.getElementById('theme').value=th;document.getElementById('density').value=dn;
document.getElementById('theme').onchange=e=>applyTheme(e.target.value);
document.getElementById('density').onchange=e=>applyDensity(e.target.value);

setInterval(()=>{document.getElementById('clock').textContent=new Date().toTimeString().slice(0,8);},1000);
(function(){const fresh=(Date.now()-D.generated_ms)<180000;
 const dot=document.getElementById('livedot'),txt=document.getElementById('livetxt');
 if(!fresh){dot.style.background='#b07c0e';dot.style.boxShadow='none';dot.style.animation='none';
  txt.textContent='PAUSADO';txt.title='El Conductor no regenera hace >3 min';}
 else{dot.style.background='var(--accent,#0b9e57)';}
})();

(function(){
 const M=D.money;const pnl=M&&M.current!=null?M.current-M.cost:null;
 const kp=[
  ['VALOR REAL',M&&M.current!=null?money(M.current)+' MXN':'—',pnl!=null?pchip(pnl/M.cost*100):''],
  ['P/L NO REALIZADO',pnl!=null?money(pnl)+' MXN':'—',pnl!=null?pchip(pnl/M.cost*100):''],
  ['POSICIONES',String(D.holdings.length),`<span style="font-size:10px;color:#5f6673">${D.holdings.filter(h=>h.kind==='real').length} real · ${D.holdings.filter(h=>h.kind==='papel').length} papel</span>`],
  ['TESIS VIGILADAS',String(D.theses.length),`<span style="font-size:10px;color:#5f6673">${D.decisions} con decisión</span>`],
  ['EVIDENCIAS',String(D.counts.evidence),`<span style="font-size:10px;color:#5f6673">${D.counts.confidence_history} snapshots</span>`],
 ];
 document.getElementById('kpis').innerHTML=kp.map(([l,v,c])=>
  `<div style="background:#ffffff;border:1px solid #d6dae0;border-radius:12px;padding:15px 17px">
   <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:#5f6673;margin-bottom:7px">${l}</div>
   <div style="font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:7px">${v}</div>
   <div>${c}</div></div>`).join('');
 if(M&&M.current!=null){
  document.getElementById('mv').textContent=money(M.current)+' MXN';
  const p=M.current-M.cost,pc=p/M.cost*100,el=document.getElementById('mp');
  el.textContent=`${p>=0?'▲ +':'▼ −'}${fmt(Math.abs(p))} (${p>=0?'+':'−'}${fmt(Math.abs(pc))}%)`;
  el.style.color=pcol(p);
  document.getElementById('ms').textContent=`${M.label} · PUESTO ${money(M.cost,0)} · BITSO`;
 }else if(M&&M.missing&&M.missing.length){
  /* sin precio de algún activo este tick: se dice, no se inventa un total parcial */
  document.getElementById('mv').textContent='—';
  const el=document.getElementById('mp');
  el.textContent=`⚠ SIN PRECIO DE ${M.missing.join(', ')} ESTE TICK — reintenta en el próximo`;
  el.style.color='#b07c0e';
  document.getElementById('ms').textContent=`${M.label} · PUESTO ${money(M.cost,0)} · BITSO`;
 }
})();

/* gráfica principal — ancho completo, alto 320px, rangos reales */
const CH=320;
const RANGES=[['1D','d1',0],['1S','y1',7],['1M','y1',30],['1A','y1',365]];
let curRange=localStorage.getItem('dave-range')||'1M';
/* portafolio joven: si el rango elegido casi no tiene puntos, cae a 1D (intradía) */
if(D.money&&(!D.money.y1||D.money.y1.length<3)&&D.money.d1&&D.money.d1.length>2&&curRange!=='1D')curRange='1D';
function renderRanges(){
 document.getElementById('ranges').innerHTML=RANGES.map(([k])=>
  `<span onclick="setRange('${k}')" style="cursor:pointer;padding:4px 11px;border-radius:6px;font-size:10.5px;font-weight:700;${k===curRange?'background:#111418;color:#fff':'color:#8a919d'}">${k}</span>`).join('');
}
window.setRange=k=>{curRange=k;localStorage.setItem('dave-range',k);renderRanges();renderChart();};
function seriesFor(k){
 const M=D.money;if(!M)return[];
 const [,src,days]=RANGES.find(r=>r[0]===k)||RANGES[2];
 let S=M[src]||[];
 if(src==='y1'&&days&&S.length){const cut=Date.now()-days*864e5;S=S.filter(p=>p[0]>=cut);}
 return S;
}
function renderChart(){
 const M=D.money,host=document.getElementById('mchart');
 const old=host.querySelector('svg');if(old)old.remove();
 host.querySelectorAll('.mkr').forEach(e=>e.remove());
 if(!M){host.insertAdjacentHTML('beforeend','<div style="color:#747c89;font-size:11px;padding:30px 0">sin posición real aún</div>');return;}
 const S=seriesFor(curRange);
 if(S.length<2){host.insertAdjacentHTML('beforeend','<div style="color:#747c89;font-size:11px;padding:30px 0">sin serie para este rango (red caída este tick)</div>');return;}
 const W=1400,H=320,L=8,R=8,T=14,B=26;
 const costAt=ts=>{let c=0;for(const st of (M.steps||[])){if(st[0]<=ts)c=st[1];else break;}return c||M.cost;};
 const stepVals=S.map(p=>costAt(p[0]));
 const vals=S.map(p=>p[1]).concat(stepVals);
 let lo=Math.min(...vals),hi=Math.max(...vals);const pad=(hi-lo)*0.1||1;lo-=pad;hi+=pad;
 const x=i=>L+i*(W-L-R)/(S.length-1), y=v=>T+(hi-v)*(H-T-B)/(hi-lo);
 let line='';S.forEach((p,i)=>{line+=(i?' L':'M')+`${x(i).toFixed(1)},${y(p[1]).toFixed(1)}`;});
 const area=line+` L${x(S.length-1).toFixed(1)},${H-B} L${x(0).toFixed(1)},${H-B} Z`;
 /* escalera de "puesto" (costo acumulado): sube con cada compra */
 let costLine='';S.forEach((p,i)=>{const cv=y(costAt(p[0]));
  costLine+=(i?` L${x(i).toFixed(1)},${cv.toFixed(1)}`:`M${x(i).toFixed(1)},${cv.toFixed(1)}`);});
 const grid=[0.2,0.4,0.6,0.8].map(f=>{const g=T+f*(H-T-B);
  return `<line x1="${L}" y1="${g}" x2="${W-R}" y2="${g}" stroke="#e8eaee" stroke-width="1"/>`}).join('');
 const cy=y(costAt(S[S.length-1][0]));
 const dt=ms=>{const d=new Date(ms);const mo=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getMonth()];
  return curRange==='1D'?d.toTimeString().slice(0,5):`${d.getDate()} ${mo}`;};
 const nt=6;
 const ticks=Array.from({length:nt},(_,k)=>Math.round(k*(S.length-1)/(nt-1))).map(i=>
  `<text x="${x(i)}" y="${H-8}" text-anchor="middle" font-size="10" fill="#747c89" font-family="inherit">${dt(S[i][0])}</text>`).join('');
 host.insertAdjacentHTML('beforeend',`
 <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;width:100%;height:${CH}px" role="img" aria-label="Valor de la posición real en MXN">
  ${grid}
  <path d="${area}" fill="rgba(0,0,0,0.05)"/>
  <path d="${line}" fill="none" stroke="var(--accent,#111418)" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round"/>
  <path d="${costLine}" fill="none" stroke="#8a919d" stroke-width="1" stroke-dasharray="5 5" vector-effect="non-scaling-stroke"/>
  <line id="xh" x1="0" y1="${T}" x2="0" y2="${H-B}" stroke="#8a919d" stroke-width="1" opacity="0" vector-effect="non-scaling-stroke"/>
  <rect id="ov" x="${L}" y="0" width="${W-L-R}" height="${H}" fill="transparent"/>
 </svg>`);
 const svg=host.querySelector('svg');
 const leftAt=i=>`calc(18px + ${(x(i)/W).toFixed(4)}*(100% - 36px))`;
 const topAt=v=>((y(v)/H)*CH+6).toFixed(1)+'px';
 const last=S[S.length-1];
 host.insertAdjacentHTML('beforeend',
  `<div class="mkr" style="position:absolute;left:${leftAt(S.length-1)};top:${topAt(last[1])};width:8px;height:8px;margin:-4px 0 0 -4px;border-radius:50%;background:var(--accent,#111418);border:2px solid #ffffff"></div>`);
 if(M.buys&&M.buys.length){
  M.buys.forEach((b,k)=>{let bi=0,bd=Infinity;
   S.forEach((p,i)=>{const d=Math.abs(p[0]-b.ms);if(d<bd){bd=d;bi=i;}});
   const lbl=`+${money(b.cost,0)} ${b.sym}`;
   const dy=(k%2)?34:18;   /* alterna la altura para que las etiquetas no se pisen */
   host.insertAdjacentHTML('beforeend',
    `<div class="mkr" title="compra ${b.sym} · ${money(b.cost,0)}" style="position:absolute;left:${leftAt(bi)};top:${topAt(S[bi][1])};width:8px;height:8px;margin:-4px 0 0 -4px;border-radius:50%;background:#b07c0e;border:2px solid #ffffff"></div>
     <div class="mkr" style="position:absolute;left:${leftAt(bi)};top:calc(${topAt(S[bi][1])} - ${dy}px);transform:translateX(-50%);font-size:9.5px;color:#b07c0e;font-weight:700;white-space:nowrap">${lbl}</div>`);});}
 host.insertAdjacentHTML('beforeend',
  `<div class="mkr" style="position:absolute;right:22px;top:calc(${topAt(M.cost)} - 14px);font-size:9.5px;color:#8a919d;font-weight:600">PUESTO ${money(M.cost,0)}</div>`);
 const ov=host.querySelector('#ov'),xh=host.querySelector('#xh'),tip=document.getElementById('tip');
 ov.addEventListener('mousemove',ev=>{
  const r=svg.getBoundingClientRect();
  const fx=(ev.clientX-r.left)/r.width*W;
  let i=Math.round((fx-L)/((W-L-R)/(S.length-1)));i=Math.max(0,Math.min(S.length-1,i));
  xh.setAttribute('x1',x(i));xh.setAttribute('x2',x(i));xh.setAttribute('opacity','0.5');
  tip.style.display='block';
  tip.style.left=Math.min(ev.clientX-r.left+14,r.width-150)+'px';
  tip.style.top=(ev.clientY-r.top-16)+'px';
  const d=S[i][1]-costAt(S[i][0]);
  tip.innerHTML=`<b>${dt(S[i][0])}</b> · ${money(S[i][1])} <span style="color:${pcol(d)}">(${d>=0?'+':'−'}${fmt(Math.abs(d))} vs puesto)</span>`;});
 ov.addEventListener('mouseleave',()=>{tip.style.display='none';xh.setAttribute('opacity','0');});
}
renderRanges();renderChart();

function sparkSvg(vals,w=92,h=26,colorByEnds=true){
 if(!vals||vals.length<2)return`<span style="color:#b6bcc6">—</span>`;
 const lo=Math.min(...vals),hi=Math.max(...vals),sp=(hi-lo)||1;
 const pts=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${(h-2-(v-lo)/sp*(h-4)).toFixed(1)}`).join(' ');
 const up=vals[vals.length-1]>=vals[0];
 return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block">
  <polyline points="${pts}" fill="none" stroke="${up?GAIN:LOSS}" stroke-width="1.5" vector-effect="non-scaling-stroke"/></svg>`;
}
const classDot=k=>`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${k==='real'?'var(--accent,#111418)':'#7d8592'}"></span>`;
const btn=(txt,url)=>`<a href="${url}" target="_blank" onclick="event.stopPropagation()" onmouseover="this.style.borderColor='var(--accent,#111418)';this.style.color='#111418'" onmouseout="this.style.borderColor='#c9ced6';this.style.color='#5f6673'" style="border:1px solid #c9ced6;border-radius:6px;padding:3px 8px;font-size:9.5px;font-weight:700;color:#5f6673;white-space:nowrap">${txt} ↗</a>`;
const pagina=t=>t==='XRP'?'https://bitso.com/es_mx/precio/xrp':`https://finance.yahoo.com/quote/${t}`;
const noticias=t=>`https://news.google.com/search?q=${encodeURIComponent(t)}`;

 html+=D.holdings.map(h=>{
  const t=D.theses.find(t=>t.id===h.id)||{};
  return `<div class="hrow" data-f="${esc((h.ticker+' '+(t.name||'')).toLowerCase())}" onclick="location.href='activo.html#${h.id}'" onmouseover="this.style.background='#f0f2f5'" onmouseout="this.style.background='transparent'"
   style="display:grid;grid-template-columns:${cols};gap:10px;align-items:center;padding:var(--rp,9px) 18px;border-bottom:1px solid #edeff2;cursor:pointer">
   <span class="desk">${classDot(h.kind)} <span style="font-size:9.5px;color:#747c89;text-transform:uppercase">${h.kind}</span></span>
   <span style="min-width:0"><b style="font-size:12.5px">${esc(h.ticker)}</b><br><span style="font-size:9.5px;color:#747c89;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block">${esc(t.name||'')}</span></span>
   <span class="px" data-sym="${esc(h.symbol)}" style="font-weight:700;transition:color .5s">${h.last!=null?money(h.last)+' '+h.unit:'—'}</span>
   <span style="font-weight:700;color:${pcol(h.chg24??0)}">${h.chg24!=null?(h.chg24>=0?'+':'−')+fmt(Math.abs(h.chg24))+'%':'—'}</span>
   <span class="desk">${sparkSvg(h.spark)}</span>
   <span class="desk" style="font-size:11px">${h.qty}<br><span style="font-size:9.5px;color:#747c89">@${fmt(h.avg)} ${h.unit}</span></span>
   <span class="desk" style="font-weight:700">${h.value!=null?money(h.value)+' '+h.unit:'—'}</span>
   <span style="font-weight:700;color:${pcol(h.pnl??0)}">${h.pnl!=null?(h.pnl>=0?'+':'−')+fmt(Math.abs(h.pnl)):'—'}<br><span style="font-size:10px">${h.pnl_pct!=null?(h.pnl_pct>=0?'+':'−')+fmt(Math.abs(h.pnl_pct))+'%':''}</span></span>
   <span class="desk" style="display:flex;gap:6px">${btn('PÁGINA',pagina(h.ticker))}${btn('NEWS',noticias(h.ticker))}</span>
  </div>`;}).join('');
 document.getElementById('holdings').innerHTML=html;
 document.getElementById('hcount').textContent=D.holdings.length+' POSICIONES';
})();

 </div>`).join('');
 document.getElementById('lots').innerHTML=html;

})();

/* SEGUIMIENTO — mismo formato de tabla que Tenencias (escaneo rápido) */
(function(){
 const ws=D.theses.filter(t=>!t.held).sort((a,b)=>b.confidence-a.confidence);
 const cols='var(--wcols,66px minmax(120px,1.4fr) 108px 78px 100px 118px 132px 150px 132px)';
 const hd=[['DIR','desk'],['ACTIVO',''],['ÚLTIMO','desk'],['Δ CONF','desk'],['SPARK·CONF','desk'],['CONFIANZA',''],['ACCIÓN',''],['DECISIÓN',''],['ENLACES','desk']];
 const arrow=d=>d==='long'?`<span style="color:${GAIN}">▲</span> <span style="font-size:9.5px;color:#747c89">LONG</span>`
  :d==='short'?`<span style="color:${LOSS}">▼</span> <span style="font-size:9.5px;color:#747c89">SHORT</span>`
  :`<span style="color:#5f6673">●</span> <span style="font-size:9.5px;color:#747c89">WATCH</span>`;
 let html=`<div style="display:grid;grid-template-columns:${cols};gap:10px;padding:8px 18px;border-bottom:1px solid #edeff2">`+
  hd.map(([h,c])=>`<span class="${c}" style="font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#747c89">${h}</span>`).join('')+`</div>`;
 html+=ws.map(t=>{
  const dc=t.dconf||0;
  const cbar=`<span style="display:flex;align-items:center;gap:8px"><span style="flex:1;height:8px;background:#eef0f3;border-radius:4px;overflow:hidden"><span style="display:block;height:8px;width:${Math.round(t.confidence*100)}%;background:${t.confidence>=0.65?GAIN:t.confidence>=0.45?'#b07c0e':LOSS}"></span></span><b>${t.confidence.toFixed(2)}</b></span>`;
  const dec=t.intent?`<span style="font-size:9.5px;font-weight:700;color:${/condicionada/i.test(t.intent.decision||'')?'#b07c0e':GAIN}">${/condicionada/i.test(t.intent.decision||'')?'COND.':'FIRME'}</span>`:`<span style="color:#b6bcc6">—</span>`;
  return `<div class="wrow" data-f="${esc((t.ticker+' '+t.name+' '+t.id).toLowerCase())}">
  <div onclick="const d=this.parentNode.querySelector('.wdet');d.style.display=d.style.display==='block'?'none':'block'"
   onmouseover="this.style.background='#f0f2f5'" onmouseout="this.style.background='transparent'"
   style="display:grid;grid-template-columns:${cols};gap:10px;align-items:center;padding:var(--rp,9px) 18px;border-bottom:1px solid #edeff2;cursor:pointer">
   <span class="desk">${arrow(t.direction)}</span>
   <span style="min-width:0"><b style="font-size:12.5px">${esc(t.ticker)}</b><br><span style="font-size:9.5px;color:#747c89;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block">${esc(t.name)}</span></span>
   <span class="desk" style="font-weight:700">${t.price!=null?money(t.price):'—'}</span>
   <span class="desk" style="font-weight:700;color:${pcol(dc)}">${dc?(dc>0?'+':'−')+Math.abs(dc).toFixed(2):'·'}</span>
   <span class="desk">${sparkSvg(t.history)}</span>
   <span>${cbar}</span>
   <span style="font-size:10px;font-weight:700;color:#5f6673;text-transform:uppercase">${esc(t.action||'—')}</span>
   <span>${dec}</span>
   <span class="desk" style="display:flex;gap:6px">${btn('PÁGINA',pagina(t.ticker))}${btn('NEWS',noticias(t.ticker))}</span>
  </div>
  <div class="wdet" style="display:none;padding:10px 18px 14px;border-bottom:1px solid #edeff2;background:#eef0f3;font-size:11px;line-height:1.7">
   ${t.hypothesis?`<div style="color:#3d434c">${esc(t.hypothesis)}</div>`:''}
   ${t.intent?`<div style="margin-top:7px;padding:6px 9px;border:1px dashed ${/condicionada/i.test(t.intent.decision||'')?'#b07c0e':GAIN};border-radius:6px;font-size:10px;color:${/condicionada/i.test(t.intent.decision||'')?'#b07c0e':GAIN}">DECISIÓN — ${esc(t.intent.decision||'')}</div>`:''}
   ${t.warnings.length?`<div style="margin-top:7px;color:#b07c0e;font-size:10.5px">⚠ ${t.warnings.map(esc).join(' · ')}</div>`:''}
   <div style="margin-top:9px;display:flex;gap:6px">${btn('REPORTE COMPLETO','research.html#'+t.id)}</div>
  </div></div>`;}).join('');
 document.getElementById('watch').innerHTML=html;
 document.getElementById('wcount').textContent=ws.length+' TESIS · CLICK = DETALLE · REPORTE ↗ = INVESTIGACIÓN';
})();

(function(){
 let prev={};try{prev=JSON.parse(localStorage.getItem('dave-prices')||'{}');}catch(e){}

 D.holdings.forEach(h=>{if(h.last==null)return;now[h.symbol]=h.last;
