<script>
const D=JSON.parse(document.getElementById('data').textContent);
const GAIN='#0b9e57',LOSS='#d5372f';
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt=(v,d=2)=>Number(v).toLocaleString('es-MX',{minimumFractionDigits:d,maximumFractionDigits:d});
const money=(v,d=2)=>(v<0?'\u2212$':'$')+fmt(Math.abs(v),d);
const pcol=v=>v>0?GAIN:v<0?LOSS:'#3d434c';
const H=D.holdings||[];
const byId=Object.fromEntries(D.theses.map(t=>[t.id,t]));
let cur=(location.hash||'').slice(1)||((H[0]||{}).id||'');
let range=localStorage.getItem('dave-asset-range')||'1M';

function renderTabs(){
 document.getElementById('tabs').innerHTML=H.map(h=>
  `<a href="#${h.id}" style="border:1px solid ${h.id===cur?'#111418':'#c9ced6'};border-radius:14px;padding:3px 11px;font-size:11px;font-weight:700;color:${h.id===cur?'#111418':'#5f6673'}">${esc(h.ticker)}</a>`).join('');
}
function seriesFor(pp,k){
 const src=k==='1D'?(pp.d1u||[]):(pp.y1u||[]);
 if(k==='1S'||k==='1M'){const days=k==='1S'?7:30;const cut=Date.now()-days*864e5;return src.filter(p=>p[0]>=cut);}
 return src;
}
function render(){
 renderTabs();
 const h=H.find(x=>x.id===cur)||H[0];
 if(!h){document.getElementById('main').innerHTML='<div style="color:#747c89">sin tenencias aún</div>';return;}
 const t=byId[h.id]||{};
 const M=D.money||{}; const pp=(M.per||{})[h.symbol]||{};
 const lots=(M.lots||[]).filter(l=>l.sym===h.ticker);
 const news=(D.asset_news||{})[h.id]||[];
 const S=seriesFor(pp,range);
 const avg=h.avg;
 const dirB={long:['\u25b2 LONG',GAIN],short:['\u25bc SHORT',LOSS],watch:['\u25cf WATCH','#b07c0e']}[t.direction]||['\u2014','#5f6673'];
 let chart='<div style="color:#747c89;font-size:11px;padding:26px 0">sin serie para este rango</div>';
 if(S.length>=2){
  const W=1200,CH=280,L=8,R=8,T=14,B=26;
  const vals=S.map(p=>p[1]).concat([avg]);
  let lo=Math.min(...vals),hi=Math.max(...vals);const pad=(hi-lo)*0.1||0.01;lo-=pad;hi+=pad;
  const x=i=>L+i*(W-L-R)/(S.length-1), y=v=>T+(hi-v)*(CH-T-B)/(hi-lo);
  let line='';S.forEach((p,i)=>{line+=(i?' L':'M')+`${x(i).toFixed(1)},${y(p[1]).toFixed(1)}`;});
  const area=line+` L${x(S.length-1).toFixed(1)},${CH-B} L${x(0).toFixed(1)},${CH-B} Z`;
  const grid=[0.25,0.5,0.75].map(f=>{const g=T+f*(CH-T-B);
   return `<line x1="${L}" y1="${g}" x2="${W-R}" y2="${g}" stroke="#e8eaee" stroke-width="1"/>`;}).join('');
  const ay=y(Math.min(Math.max(avg,lo),hi));
  const dt=ms=>{const d=new Date(ms);const mo=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getMonth()];
   return range==='1D'?d.toTimeString().slice(0,5):`${d.getDate()} ${mo}`;};
  const nt=5;
  const ticks=Array.from({length:nt},(_,k)=>Math.round(k*(S.length-1)/(nt-1))).map(i=>
   `<text x="${x(i)}" y="${CH-7}" text-anchor="middle" font-size="10" fill="#747c89" font-family="inherit">${dt(S[i][0])}</text>`).join('');
  let buyDots='';
  lots.forEach(l=>{let bi=0,bd=Infinity;
   S.forEach((p,i)=>{const d=Math.abs(p[0]-l.ms);if(d<bd){bd=d;bi=i;}});
   const pu=(l.cost!=null&&l.qty)?l.cost/l.qty:S[bi][1];   /* público: sin monto, dot al precio de mercado de esa fecha */
   const py=y(Math.min(Math.max(pu,lo),hi));
   const lbl=(l.cost!=null)?`+${money(l.cost,0)}`:'COMPRA';
   buyDots+=`<circle cx="${x(bi)}" cy="${py}" r="5" fill="#b07c0e" stroke="#ffffff" stroke-width="2"><title>compra</title></circle>
    <text x="${x(bi)}" y="${py-10}" text-anchor="middle" font-size="10" fill="#b07c0e" font-weight="700">${lbl}</text>`;});
  const last=S[S.length-1];
  chart=`<svg viewBox="0 0 ${W} ${CH}" preserveAspectRatio="none" style="display:block;width:100%;height:250px" role="img" aria-label="Precio de ${esc(h.ticker)} en ${esc(h.unit)}">
   ${grid}
   <path d="${area}" fill="rgba(0,0,0,0.05)"/>
   <path d="${line}" fill="none" stroke="#111418" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round"/>
   <line x1="${L}" y1="${ay}" x2="${W-R}" y2="${ay}" stroke="#8a919d" stroke-width="1" stroke-dasharray="5 5" vector-effect="non-scaling-stroke"/>
   <text x="${W-R-4}" y="${ay-5}" text-anchor="end" font-size="10" fill="#747c89" font-family="inherit">TU BASE ${fmt(avg,4)}</text>
   ${buyDots}
   <circle cx="${x(S.length-1)}" cy="${y(last[1])}" r="4" fill="#111418" stroke="#ffffff" stroke-width="2"/>
   ${ticks}
  </svg>`;
 }
 const rangesHtml=['1D','1S','1M','1A'].map(k=>
  `<span onclick="setRange('${k}')" style="cursor:pointer;padding:4px 11px;border-radius:6px;font-size:10.5px;font-weight:700;${k===range?'background:#111418;color:#fff':'color:#8a919d'}">${k}</span>`).join('');
 const kpi=(l,v,c)=>`<div style="background:#ffffff;border:1px solid #d6dae0;border-radius:12px;padding:12px 15px">
  <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:#5f6673;margin-bottom:5px">${l}</div>
  <div style="font-size:20px;font-weight:800;letter-spacing:-.02em;${c?`color:${c}`:''}">${v}</div></div>`;
 const lotsRows=lots.map(l=>{const d=new Date(l.ms);
  return `<div style="display:grid;grid-template-columns:110px 1fr 110px 110px 90px;gap:10px;padding:8px 16px;border-bottom:1px solid #edeff2;font-size:12px">
  <span style="color:#5f6673">${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}</span>
  <span>${(l.qty!=null&&l.cost!=null)?l.qty+' @ '+fmt(l.cost/l.qty,4):(l.weight!=null?fmt(l.weight,1)+'% del total':'\u2014')}</span>
  <span style="font-weight:700">${l.cost!=null?money(l.cost,0):'\u2014'}</span>
  <span style="font-weight:700">${l.value!=null?money(l.value):'\u2014'}</span>
  <span style="font-weight:700;color:${pcol(l.pnl_pct??0)}">${l.pnl_pct!=null?(l.pnl_pct>=0?'+':'\u2212')+fmt(Math.abs(l.pnl_pct))+'%':'\u2014'}</span></div>`;}).join('');
 const newsHtml=news.length?news.map(n=>
  `<a href="${esc(n.link)}" target="_blank" onmouseover="this.style.background='#f0f2f5'" onmouseout="this.style.background='transparent'" style="display:block;padding:9px 16px;border-bottom:1px solid #edeff2">
   <span style="font-size:11.5px;color:#2a2f36">${esc(n.title)} <span style="color:#747c89">\u2197</span></span>
   <span style="display:block;font-size:9.5px;color:#747c89;margin-top:2px">${esc(n.source)}</span></a>`).join('')
  :'<div style="padding:12px 16px;font-size:11px;color:#747c89">sin noticias esta semana</div>';
 const sec=(title,body,extra='')=>`<section style="background:#ffffff;border:1px solid #d6dae0;border-radius:12px;margin-bottom:14px">
  <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #e6e8ec">
   <span style="width:3px;height:12px;background:#111418;border-radius:2px"></span>
   <span style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:#5f6673">${title}</span>${extra}
  </div>${body}</section>`;
 document.getElementById('main').innerHTML=`
  <div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:12px">
   <b style="font-size:26px;letter-spacing:-.02em">${esc(h.ticker)}</b>
   <span style="font-size:11px;color:#5f6673">${esc(t.name||'')}</span>
   <span style="font-size:10px;font-weight:700;color:${dirB[1]}">${dirB[0]}</span>
   <span style="font-size:10px;color:#747c89">CONF ${(t.confidence??0).toFixed(2)} \u00b7 ${esc((t.action||'\u2014').toUpperCase())}</span>
   <a href="research.html#${h.id}" target="_blank" style="border:1px solid #c9ced6;border-radius:6px;padding:3px 9px;font-size:9.5px;font-weight:700;color:#5f6673">INVESTIGACI\u00d3N \u2197</a>
   <a href="https://news.google.com/search?q=${encodeURIComponent(h.ticker)}" target="_blank" style="border:1px solid #c9ced6;border-radius:6px;padding:3px 9px;font-size:9.5px;font-weight:700;color:#5f6673">NEWS \u2197</a>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px">
   ${kpi('\u00daLTIMO',h.last!=null?money(h.last)+' '+h.unit:'\u2014')}
   ${kpi('POSICI\u00d3N',(h.qty??'\u2014')+'<br><span style="font-size:11px;color:#747c89">@'+(avg!=null?fmt(avg):'\u2014')+' '+h.unit+'</span>')}
   ${kpi('VALOR',h.value!=null?money(h.value)+' '+h.unit:'\u2014')}
   ${kpi('P/L',(h.pnl!=null?(h.pnl>=0?'+':'\u2212')+fmt(Math.abs(h.pnl)):'\u2014')+(h.pnl_pct!=null?` <span style="font-size:13px">(${h.pnl_pct>=0?'+':'\u2212'}${fmt(Math.abs(h.pnl_pct))}%)</span>`:''),pcol(h.pnl??0))}
  </div>
  ${sec('Precio '+esc(h.ticker)+' \u2014 tus compras y tu base',`<div style="padding:12px 16px">${chart}</div>`,
   `<span style="margin-left:auto;display:flex;gap:2px;background:#eef0f3;border:1px solid #d6dae0;border-radius:8px;padding:2px">${rangesHtml}</span>`)}
  ${sec('Compras de este activo',lotsRows||'<div style="padding:12px 16px;font-size:11px;color:#747c89">sin lotes</div>')}
  ${sec('Noticias de la semana',newsHtml)}`;
}
window.setRange=k=>{range=k;localStorage.setItem('dave-asset-range',k);render();};
window.addEventListener('hashchange',()=>{cur=(location.hash||'').slice(1)||cur;render();});
render();
</script></body></html>
